        "query-input": "required name=search_term_string"

          "@type": "Question",

            "text": "Platform yang menyediakan nomor virtual sementara untuk menerima kode OTP dari berbagai layanan seperti WhatsApp, Telegram, Instagram, dan 100+ layanan lainnya."
          }

        {
          "@type": "Question",

          "@type": "Question",

          }
        },
        {
          "@type": "Question",
          "name": "Bagaimana jika OTP tidak datang?",

            "@type": "Answer",
            "text": "Jika dalam waktu yang ditentukan OTP tidak masuk, order akan otomatis dibatalkan dan saldo dikembalikan penuh ke akun Anda."
          }
        }
      ]
    }
    </script>
